<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilos mejorados para un look Premium */
        body { 
            background-color: #eef2f5; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        
        .totem-frame { 
            width: 400px; height: 700px; background: #1a1a1a; border-radius: 40px; 
            padding: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .screen { 
            background: #ffffff; width: 100%; height: 100%; border-radius: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; position: relative;
        }

        /* Header tipo aplicación móvil */
        .header { 
            width: 100%; padding: 25px 0; background: #000; 
            color: #fff; text-align: center; font-weight: 800; 
            letter-spacing: 3px; font-size: 14px;
        }

        .content { 
            padding: 40px; text-align: center; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; flex-grow: 1;
        }

        .title { 
            font-size: 28px; font-weight: 700; color: #1a1a1a; 
            margin-bottom: 15px; text-transform: uppercase;
        }

        .description { 
            color: #666; font-size: 16px; line-height: 1.6; 
            margin-bottom: 40px; max-width: 80%;
        }

        /* Botón estilo UI moderno */
        .btn-start { 
            background: #000; color: #fff; padding: 18px 40px; 
            border-radius: 50px; font-weight: 600; cursor: pointer; 
            transition: all 0.3s ease; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-start:hover { transform: translateY(-5px); background: #333; }

        /* Elemento decorativo visual */
        .footer-deco { 
            width: 100%; height: 8px; background: linear-gradient(90deg, #000, #444);
        }
    </style>
</head>
<body>

<div class="totem-frame">
    <div class="screen">
        <div class="header">PETRIZZIO SUSTENTABLE</div>
        
        <div class="content">
            <h1 class="title">Revierte el Ciclo</h1>
            <p class="description">
                Únete a nuestra iniciativa de reciclaje. Deposita tus envases y bandejas de maquillaje para obtener recompensas exclusivas.
            </p>
            <button class="btn-start" onclick="alert('Iniciando...')">INICIAR DEPÓSITO</button>
        </div>
        
        <div class="footer-deco"></div>
    </div>
</div>

</body>
</html>
