<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Tótem Petrizzio RVM v3.1</title>
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #f4f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .totem-container { width: 420px; background-color: #1a1a1a; border-radius: 24px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 4px solid #333; }
        .screen { background-color: #ffffff; width: 100%; height: 520px; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; color: #111; }
        .screen-header { background-color: #000000; color: #ffffff; padding: 15px; text-align: center; font-size: 14pt; font-weight: bold; letter-spacing: 2px; }
        .screen-content { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .welcome-title { font-size: 18pt; text-align: center; margin-top: 30px; color: #000; font-weight: 300; letter-spacing: 1px; }
        .welcome-subtitle { font-size: 10pt; text-align: center; color: #666; margin-bottom: 25px; }
        .btn-primary { background-color: #000; color: #fff; border: none; padding: 14px; border-radius: 6px; font-size: 11pt; cursor: pointer; width: 100%; margin-bottom: 5px; font-weight: bold; }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }
        .counter-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 9.5pt; }
        .counter-table th { background-color: #f0f0f0; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
        .counter-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .total-badge { background-color: #f4f0fa; border: 1px solid #7d6bb3; border-radius: 6px; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; color: #5c4d8c; }
        .btn-secondary { background-color: #fff; border: 1px solid #000; padding: 10px; border-radius: 6px; font-size: 9pt; cursor: pointer; width: 100%; margin-top: 5px; }
        .reward-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="totem-container">
    <div class="screen">
        <div class="screen-header">PETRIZZIO SUSTENTABLE</div>
        
        <div id="screen-welcome" class="screen-content">
            <div>
                <div class="welcome-title">REVIERTE EL CICLO</div>
                <div class="welcome-subtitle">Recicla, Reutiliza, Recompensa</div>
                <button class="btn-primary" onclick="changeScreen('deposit')">Iniciar Depósito</button>
            </div>
        </div>

        <div id="screen-deposit" class="screen-content" style="display: none;">
            <div>
                <div style="font-weight: bold; text-align: center; margin-bottom: 10px;"><span id="scan-status">ESPERANDO RESIDUOS...</span></div>
                <table class="counter-table">
                    <tr><td>Total Artículos</td><td id="total-count" style="text-align: right; font-weight: bold;">0</td></tr>
                </table>
                <div class="total-badge">Total Acumulado: <span id="total-sum">0</span> unidades</div>
            </div>
            <button id="btn-confirmar" class="btn-primary" disabled onclick="changeScreen('canje')">Finalizar y Canjear</button>
        </div>

        <div id="screen-canje" class="screen-content" style="display: none;">
            <div>
                <div style="font-weight: bold; text-align: center; margin-bottom: 15px;">SELECCIONA TU RECOMPENSA</div>
                
                <!-- Nivel 1 con Selección de Producto -->
                <div id="nivel-1" style="display:none;" class="reward-box">
                    <div style="margin-bottom: 8px; font-weight: bold; font-size: 9pt;">Elige tu Refill:</div>
                    <button class="btn-secondary" onclick="dispense('Refill: Maquillaje Trío')">Maquillaje Trío</button>
                    <button class="btn-secondary" onclick="dispense('Refill: Polvo Traslúcido')">Polvo Traslúcido</button>
                    <button class="btn-secondary" onclick="dispense('Refill: Paleta Correctora')">Paleta Correctora</button>
                </div>

                <div id="nivel-2" style="display:none;" class="reward-box">
                    <div style="margin-bottom: 8px; font-size: 9pt; font-weight: bold;">Elige tu premio:</div>
                    <button class="btn-secondary" onclick="dispense('Muestra Gratis')">Muestra Gratis</button>
                    <button class="btn-secondary" onclick="dispense('Espejo de Bolsillo')">Espejo de Bolsillo</button>
                </div>
                
                <div id="nivel-3" style="display:none;" class="reward-box">
                    <button class="btn-primary" style="background:#7d6bb3;" onclick="dispense('Cosmetiquero Reciclado')">👜 Canjear Cosmetiquero</button>
                </div>
            </div>
            <button class="btn-secondary" onclick="resetAll()">Cancelar</button>
        </div>

        <div id="screen-dispensing" class="screen-content" style="display: none; justify-content: center; text-align: center;">
            <div id="dispense-msg" style="font-weight: bold; font-size: 14pt;">PROCESANDO...</div>
        </div>
    </div>

    <div class="hardware-slots" style="padding-top:20px; display:flex; justify-content:center;">
        <button class="btn-secondary" onclick="dropItem()">+ Depositar Artículo Petrizzio</button>
    </div>
</div>

<script>
    let totalItems = 0;

    function changeScreen(s) {
        document.querySelectorAll('.screen-content').forEach(el => el.style.display = 'none');
        document.getElementById('screen-' + s).style.display = 'flex';
        if(s === 'canje') updatePrizeButtons();
    }

    function dropItem() {
        totalItems++;
        document.getElementById('total-count').innerText = totalItems;
        document.getElementById('total-sum').innerText = totalItems;
        document.getElementById('btn-confirmar').disabled = false;
        document.getElementById('scan-status').innerText = "¡ARTÍCULO DETECTADO!";
    }

    function updatePrizeButtons() {
        document.getElementById('nivel-1').style.display = (totalItems >= 1 && totalItems <= 2) ? 'block' : 'none';
        document.getElementById('nivel-2').style.display = (totalItems >= 3 && totalItems <= 4) ? 'block' : 'none';
        document.getElementById('nivel-3').style.display = (totalItems >= 5) ? 'block' : 'none';
    }

    function dispense(p) {
        changeScreen('dispensing');
        document.getElementById('dispense-msg').innerText = "DISPENSANDO: " + p;
        setTimeout(resetAll, 3000);
    }

    function resetAll() {
        totalItems = 0;
        document.getElementById('total-count').innerText = "0";
        document.getElementById('total-sum').innerText = "0";
        document.getElementById('btn-confirmar').disabled = true;
        document.getElementById('scan-status').innerText = "ESPERANDO RESIDUOS...";
        changeScreen('welcome');
    }
</script>

</body>
</html>
