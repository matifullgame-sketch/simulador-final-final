<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Tótem Inteligente - Petrizzio Eco</title>
    <style>
        :root {
            --bg-principal: #121212;
            --bg-totem: #1a1a1a;
            --mint-eco: #00ffcc;
            --gold-premium: #ffcc00;
            --pink-max: #ff3366;
            --gris-borde: #333333;
        }

        body {
            background-color: var(--bg-principal);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .interfaz-totem {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-totem);
            border: 2px solid var(--gris-borde);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .header-marca {
            text-align: center;
            border-bottom: 1px solid var(--gris-borde);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-marca h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--mint-eco);
            text-transform: uppercase;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .pantalla-contenido {
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .btn-accion {
            background-color: var(--mint-eco);
            color: #121212;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
        }

        .btn-accion:hover {
            background-color: #00d4aa;
            transform: translateY(-2px);
        }

        .btn-secundario {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-secundario:hover {
            background-color: #383838;
        }

        .contador-envases {
            background: #222;
            border: 1px solid var(--gris-borde);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }

        .contador-numero {
            font-size: 3rem;
            font-weight: bold;
            color: var(--mint-eco);
            display: block;
            line-height: 1;
            margin-top: 5px;
        }

        /* Tarjetas de Selección Múltiple */
        .grid-seleccion {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .tarjeta-opcion {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tarjeta-opcion span {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .tarjeta-opcion h4 {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .tarjeta-opcion p {
            font-size: 0.75rem;
            color: #aaa;
            margin: 0 0 12px 0;
            min-height: 36px;
        }

        .btn-canje-tarjeta {
            background: var(--gold-premium);
            color: #121212;
            border: none;
            padding: 8px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-canje-tarjeta:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="interfaz-totem">
        <div class="header-marca">
            <h1>PETRIZZIO</h1>
            <div class="tagline">Ecosistema Sustentable Retail</div>
        </div>

        <!-- PANTALLA 1: FLUJO DE DEPÓSITO ACTIVO -->
        <div id="pantalla-deposito" class="pantalla-contenido">
            <p style="text-align: center; color: #aaa; margin: 0;">Coloque sus envases vacíos de la línea en la boca de depósito del tótem.</p>
            
            <div class="contador-envases">
                <span style="font-size: 0.9rem; color: #888; text-transform: uppercase;">Envases Detectados</span>
                <span id="contador-actual" class="contador-numero">0</span>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-accion" onclick="registrarEnvase()">Simular Depósito</button>
                <button class="btn-secundario" onclick="procesarTerminoSesion()">Finalizar y Solicitar Recompensa</button>
            </div>
        </div>

        <!-- PANTALLA 2: DESPLIEGUE DINÁMICO DE RECOMPENSAS ESCALONADAS -->
        <div id="pantalla-recompensas" class="pantalla-contenido" style="display: none;">
            <div style="text-align: center; margin-bottom: 15px;">
                <h2 style="color: var(--mint-eco); margin: 0 0 5px 0; font-size: 1.4rem; text-transform: uppercase;">Depósito Finalizado</h2>
                <p style="margin: 0; color: #ccc;">Procesando incentivos para <strong id="total-reciclado-txt" style="color: var(--mint-eco);">0</strong> unidades.</p>
            </div>

            <!-- Contenedor donde se inyecta la lógica de negocio -->
            <div id="contenedor-dinamico-premios"></div>

            <button class="btn-secundario" onclick="reiniciarTotem()" style="margin-top: 15px; width: 100%;">Nueva Sesión / Salir</button>
        </div>
    </div>

    <script>
        let contadorEnvasesGlobal = 0;

        function registrarEnvase() {
            contadorEnvasesGlobal++;
            document.getElementById('contador-actual').innerText = contadorEnvasesGlobal;
        }

        function procesarTerminoSesion() {
            if (contadorEnvasesGlobal === 0) {
                alert("Por favor, simule depositar al menos un envase primero.");
                return;
            }
            
            document.getElementById('pantalla-deposito').style.display = 'none';
            document.getElementById('pantalla-recompensas').style.display = 'flex';
            
            ejecutarLogicaRecompensas(contadorEnvasesGlobal);
        }

        function ejecutarLogicaRecompensas(unidades) {
            document.getElementById('total-reciclado-txt').innerText = unidades;
            const contenedor = document.getElementById('contenedor-dinamico-premios');
            contenedor.innerHTML = '';

            // TRAMO 1: ACCESIBILIDAD AL REFILL DIRECTO (1 a 2 envases)
            if (unidades >= 1 && unidades <= 2) {
                contenedor.innerHTML = `
                    <div style="border: 2px solid var(--mint-eco); background: rgba(0,255,204,0.05); padding: 20px; border-radius: 8px; text-align: center;">
                        <h3 style="color: var(--mint-eco); margin-top: 0; font-size: 1.1rem;">NIVEL 1 ACUMULADO: ECO-REFILL</h3>
                        <p style="font-size: 0.9rem; color: #ddd;">Aseguramos la continuidad de tu contenedor principal Petrizzio.</p>
                        <div style="font-size: 2.5rem; margin: 10px 0;">♻️</div>
                        <p style="font-size: 1rem; margin-bottom: 0;"><strong>¡Bandeja de Refill Gratis Desbloqueada!</strong></p>
                        <small style="color: #888; display:block; margin-top:10px;">Retira el componente directamente en la compuerta inferior.</small>
                    </div>
                `;
            }
            // TRAMO 2: SELECCIÓN INDEPENDIENTE DE ACCESORIOS (3 a 4 envases)
            else if (unidades >= 3 && unidades <= 4) {
                contenedor.innerHTML = `
                    <div style="border: 2px solid var(--gold-premium); background: rgba(255,204,0,0.03); padding: 15px; border-radius: 8px;">
                        <h3 style="color: var(--gold-premium); margin-top: 0; text-align: center; font-size: 1.1rem;">NIVEL 2: SELECCIÓN DE ACCESORIOS</h3>
                        <p style="font-size: 0.85rem; text-align: center; margin: 0 0 15px 0; color: #ccc;">Selecciona en la pantalla táctil el incentivo complementario que prefieras:</p>
                        
                        <div class="grid-seleccion">
                            <div class="tarjeta-opcion">
                                <div>
                                    <span>🧴</span>
                                    <h4>Muestra Gratis</h4>
                                    <p>Sachet de cremas o bases de nuevos lanzamientos.</p>
                                </div>
                                <button class="btn-canje-tarjeta" onclick="activarMecanismoDispensador('Muestra Gratis')">Elegir Muestra</button>
                            </div>
                            
                            <div class="tarjeta-opcion">
                                <div>
                                    <span>🪞</span>
                                    <h4>Espejo Eco</h4>
                                    <p>Espejo compacto de bolsillo fabricado en bambú.</p>
                                </div>
                                <button class="btn-canje-tarjeta" onclick="activarMecanismoDispensador('Espejo de Bolsillo Eco')">Elegir Espejo</button>
                            </div>
                        </div>
                        <div id="feedback-hardware" style="margin-top: 15px; font-weight: bold; text-align: center; color: var(--gold-premium); font-size: 0.9rem;"></div>
                    </div>
                `;
            }
            // TRAMO 3: RECOMPENSA DE ALTO VOLUMEN (5 o más envases)
            else if (unidades >= 5) {
                contenedor.innerHTML = `
                    <div style="border: 2px solid var(--pink-max); background: rgba(255,51,102,0.05); padding: 20px; border-radius: 8px; text-align: center;">
                        <h3 style="color: var(--pink-max); margin-top: 0; font-size: 1.1rem;">👑 NIVEL MAX: EXPERIENCIA ECO-PREMIUM</h3>
                        <p style="font-size: 0.9rem; color: #ddd;">Premio mayor otorgado a usuarios de alto volumen de reciclaje.</p>
                        <div style="font-size: 2.5rem; margin: 10px 0;">👝</div>
                        <p style="font-size: 1rem; margin-bottom: 0;"><strong>Cosmetiquero de Algodón Orgánico</strong></p>
                        <small style="color: #888; display:block; margin-top:10px;">Dispensando elemento textil por la compuerta automatizada...</small>
                    </div>
                `;
            }
        }

        function activarMecanismoDispensador(objetoElegido) {
            document.getElementById('feedback-hardware').innerHTML = `⚙️ Señal enviada a compuerta... Despachando <strong>${objetoElegido}</strong>.`;
            
            // Simulación física: Desactivar botones de la interfaz táctil tras la elección
            const botonesCanje = document.querySelectorAll('.btn-canje-tarjeta');
            botonesCanje.forEach(btn => btn.disabled = true);
        }

        function reiniciarTotem() {
            contadorEnvasesGlobal = 0;
            document.getElementById('contador-actual').innerText = '0';
            document.getElementById('pantalla-recompensas').style.display = 'none';
            document.getElementById('pantalla-deposito').style.display = 'flex';
        }
    </script>
</body>
</html>
