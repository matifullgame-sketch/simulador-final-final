<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Tótem Petrizzio RVM v4</title>
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #f4f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .totem-container { width: 420px; background-color: #1a1a1a; border-radius: 24px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 4px solid #333; }
        .screen { background-color: #ffffff; width: 100%; height: 520px; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .screen-header { background-color: #000; color: #fff; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        .screen-content { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .btn-primary { background: #000; color: #fff; border: none; padding: 14px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; }
        .btn-secondary { background: #fff; border: 1px solid #000; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-disabled { background: #ccc !important; cursor: not-allowed; border: none !important; }
        .counter-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 9.5pt; }
        .counter-table th { background: #f0f0f0; padding: 8px; text-align: left; }
        .counter-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .total-badge { background: #f4f0fa; border: 1px solid #7d6bb3; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; color: #5c4d8c; }
        .reward-section { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="totem-container">
    <div class="screen">
        <div class="screen-header">PETRIZZIO SUSTENTABLE</div>
        
        <div id="screen-welcome" class="screen-content">
            <div style="text-align:center;">
                <h2 class="welcome-title">REVIERTE EL CICLO</h2>
                <p>Línea Trío • Polvo Traslúcido • Paleta Correctora</p>
                <button class="btn-primary" onclick="changeScreen('deposit')">Iniciar Depósito</button>
            </div>
        </div>

        <div id="screen-deposit" class="screen-content" style="display: none;">
            <div>
                <table class="counter-table">
                    <tr><th>Componente</th><th>Cant.</th></tr>
                    <tr><td>Bandejas Refill</td><td id="row-b">0</td></tr>
                    <tr><td>Envases Base</td><td id="row-base">0</td></tr>
                </table>
                <div class="total-badge">Total Acumulado: <span id="total-count">0</span></div>
            </div>
            <button id="btn-confirmar" class="btn-primary btn-disabled" disabled onclick="changeScreen('canje')">Finalizar y Elegir Premio</button>
        </div>

        <div id="screen-canje" class="screen-content" style="display: none; overflow-y: auto;">
            <div id="nivel-1" class="reward-section" style="display:none;">
                <strong style="display:block; margin-bottom:5px;">Nivel 1 (1-2 envases):</strong>
                <button class="btn-secondary" onclick="dispense('Refill: Maquillaje Trío')">Maquillaje Trío</button>
                <button class="btn-secondary" onclick="dispense('Refill: Polvo Traslúcido')">Polvo Traslúcido</button>
                <button class="btn-secondary" onclick="dispense('Refill: Paleta Correctora')">Paleta Correctora</button>
            </div>
            <div id="nivel-2" class="reward-section" style="display:none;">
                <strong style="display:block; margin-bottom:5px;">Nivel 2 (3-4 envases):</strong>
                <button class="btn-secondary" onclick="dispense('Muestra Gratis')">🎁 Muestra Gratis</button>
                <button class="btn-secondary" onclick="dispense('Espejo de Bolsillo')">🪞 Espejo de Bolsillo</button>
            </div>
            <div id="nivel-3" class="reward-section" style="display:none;">
                <strong style="display:block; margin-bottom:5px;">Nivel 3 (5+ envases):</strong>
                <button class="btn-primary" style="background:#7d6bb3;" onclick="dispense('Cosmetiquero')">👜 Cosmetiquero Tela</button>
            </div>
            <button class="btn-secondary" onclick="resetAll()">Cancelar y Reiniciar</button>
        </div>

        <div id="screen-dispensing" class="screen-content" style="display: none; justify-content: center; text-align: center;">
            <h3 id="dispense-msg">PROCESANDO...</h3>
        </div>
    </div>

    <div style="margin-top:20px; text-align:center;">
        <button class="btn-secondary" onclick="addResidue('b')">+ Depositar Bandeja</button>
        <button class="btn-secondary" onclick="addResidue('base')">+ Depositar Envase Base</button>
    </div>
</div>

<script>
    let bCount = 0, baseCount = 0;

    function changeScreen(s) {
        document.querySelectorAll('.screen-content').forEach(el => el.style.display = 'none');
        document.getElementById('screen-' + s).style.display = 'flex';
        if(s === 'canje') updateRewards();
    }

    function addResidue(type) {
        if(type === 'b') bCount++; else baseCount++;
        let total = bCount + baseCount;
        document.getElementById('row-b').innerText = bCount;
        document.getElementById('row-base').innerText = baseCount;
        document.getElementById('total-count').innerText = total;
        document.getElementById('btn-confirmar').classList.remove('btn-disabled');
        document.getElementById('btn-confirmar').disabled = false;
    }

    function updateRewards() {
        let total = bCount + baseCount;
        document.getElementById('nivel-1').style.display = (total >= 1 && total <= 2) ? 'block' : 'none';
        document.getElementById('nivel-2').style.display = (total >= 3 && total <= 4) ? 'block' : 'none';
        document.getElementById('nivel-3').style.display = (total >= 5) ? 'block' : 'none';
    }

    function dispense(item) {
        changeScreen('dispensing');
        document.getElementById('dispense-msg').innerText = "DISPENSANDO: " + item.toUpperCase();
        setTimeout(() => { resetAll(); }, 3000);
    }

    function resetAll() {
        bCount = 0; baseCount = 0;
        document.getElementById('row-b').innerText = "0";
        document.getElementById('row-base').innerText = "0";
        document.getElementById('total-count').innerText = "0";
        document.getElementById('btn-confirmar').classList.add('btn-disabled');
        document.getElementById('btn-confirmar').disabled = true;
        changeScreen('welcome');
    }
</script>
</body>
</html>
